<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      body { box-sizing: border-box; }
      * { font-family: 'Outfit', sans-serif; }
      .mono { font-family: 'Space Mono', monospace; }
      .calc-btn { transition: all 0.15s ease; position: relative; overflow: hidden; }
      .calc-btn:active { transform: translateY(1px) scale(0.99); }
      .btn-accent { background: linear-gradient(180deg, #f97316, #ea580c); color: #fff; }
      .btn-accent:hover { filter: brightness(1.05); }
      .btn-ghost:hover { background-color: rgba(0,0,0,0.06); }
    </style>
  </head>
  <body class="h-full bg-slate-100">
    <main class="min-h-full flex items-center justify-center p-4">
      <div class="w-full max-w-sm">
        <h1 class="text-center text-2xl font-semibold mb-4">Calculator</h1>

        <!-- Display -->
        <div class="rounded-t-xl bg-slate-900 text-white p-4 shadow-lg">
          <div id="previous" class="text-slate-400 text-sm h-5 mono overflow-hidden text-ellipsis"></div>
          <div id="current" class="text-right text-4xl md:text-5xl font-semibold mono break-all" aria-live="polite">0</div>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-4 gap-2 bg-white p-4 rounded-b-xl shadow-lg">
          <button data-action="clear" class="calc-btn btn-ghost py-3 rounded-lg text-orange-600 font-semibold">AC</button>
          <button data-action="sign" class="calc-btn btn-ghost py-3 rounded-lg">±</button>
          <button data-action="percent" class="calc-btn btn-ghost py-3 rounded-lg">%</button>
          <button data-op="/" class="calc-btn py-3 rounded-lg bg-slate-200">÷</button>

          <button data-num="7" class="calc-btn py-3 rounded-lg bg-slate-50">7</button>
          <button data-num="8" class="calc-btn py-3 rounded-lg bg-slate-50">8</button>
          <button data-num="9" class="calc-btn py-3 rounded-lg bg-slate-50">9</button>
          <button data-op="*" class="calc-btn py-3 rounded-lg bg-slate-200">×</button>

          <button data-num="4" class="calc-btn py-3 rounded-lg bg-slate-50">4</button>
          <button data-num="5" class="calc-btn py-3 rounded-lg bg-slate-50">5</button>
          <button data-num="6" class="calc-btn py-3 rounded-lg bg-slate-50">6</button>
          <button data-op="-" class="calc-btn py-3 rounded-lg bg-slate-200">−</button>

          <button data-num="1" class="calc-btn py-3 rounded-lg bg-slate-50">1</button>
          <button data-num="2" class="calc-btn py-3 rounded-lg bg-slate-50">2</button>
          <button data-num="3" class="calc-btn py-3 rounded-lg bg-slate-50">3</button>
          <button data-op="+" class="calc-btn py-3 rounded-lg bg-slate-200">+</button>

          <button data-action="del" class="calc-btn py-3 rounded-lg bg-slate-100">DEL</button>
          <button data-num="0" class="calc-btn py-3 rounded-lg bg-slate-50 col-span-1">0</button>
          <button data-dot class="calc-btn py-3 rounded-lg bg-slate-50">.</button>
          <button data-equals class="calc-btn py-3 rounded-lg btn-accent">=</button>
        </div>

        <p class="text-center text-xs text-slate-500 mt-3">Keyboard: 0-9, + - * /, Enter, Backspace, Delete, %, .</p>
      </div>
    </main>

    <script>
      (function() {
        const elPrev = document.getElementById('previous');
        const elCurr = document.getElementById('current');

        let current = '0';
        let previous = '';
        let operation = null; // '+', '-', '*', '/'
        let justEvaluated = false;

        function format(n) {
          const [int, dec] = n.split('.');
          const intFmt = Number.isFinite(+int) ? (+int).toLocaleString('en-US') : int;
          return dec !== undefined ? `${intFmt}.${dec}` : intFmt;
        }

        function updateDisplay() {
          elCurr.textContent = format(current);
          elPrev.textContent = previous && operation ? `${format(previous)} ${operation}` : '';
        }

        function clearAll() {
          current = '0';
          previous = '';
          operation = null;
          justEvaluated = false;
          updateDisplay();
        }

        function del() {
          if (justEvaluated) return; // don't edit result immediately
          if (current.length <= 1 || (current.length === 2 && current.startsWith('-'))) {
            current = '0';
          } else {
            current = current.slice(0, -1);
          }
          updateDisplay();
        }

        function appendNumber(d) {
          if (justEvaluated) { current = '0'; justEvaluated = false; }
          if (d === '0' && current === '0') return;
          if (current === '0' && d !== '.') current = '';
          current += d;
          updateDisplay();
        }

        function addDot() {
          if (justEvaluated) { current = '0'; justEvaluated = false; }
          if (current.includes('.')) return;
          current += (current === '' ? '0.' : '.');
          updateDisplay();
        }

        function chooseOperation(op) {
          if (operation && previous !== '' && !justEvaluated) {
            compute();
          }
          previous = current;
          operation = op;
          current = '0';
          justEvaluated = false;
          updateDisplay();
        }

        function compute() {
          if (operation === null || previous === '') return;
          const a = parseFloat(previous);
          const b = parseFloat(current);
          if (!Number.isFinite(a) || !Number.isFinite(b)) return;
          let res = 0;
          switch (operation) {
            case '+': res = a + b; break;
            case '-': res = a - b; break;
            case '*': res = a * b; break;
            case '/': res = b === 0 ? NaN : a / b; break;
            default: return;
          }
          current = String(res);
          previous = '';
          operation = null;
          justEvaluated = true;
          updateDisplay();
        }

        function toggleSign() {
          if (current === '0') return;
          current = current.startsWith('-') ? current.slice(1) : '-' + current;
          updateDisplay();
        }

        function percent() {
          const n = parseFloat(current);
          if (!Number.isFinite(n)) return;
          current = String(n / 100);
          updateDisplay();
        }

        // Mouse interactions
        document.querySelectorAll('[data-num]').forEach(btn =>
          btn.addEventListener('click', () => appendNumber(btn.dataset.num))
        );
        document.querySelectorAll('[data-op]').forEach(btn =>
          btn.addEventListener('click', () => chooseOperation(btn.dataset.op))
        );
        document.querySelector('[data-equals]').addEventListener('click', compute);
        document.querySelector('[data-action="clear"]').addEventListener('click', clearAll);
        document.querySelector('[data-action="del"]').addEventListener('click', del);
        document.querySelector('[data-action="sign"]').addEventListener('click', toggleSign);
        document.querySelector('[data-dot]').addEventListener('click', addDot);
        document.querySelector('[data-action="percent"]').addEventListener('click', percent);

        // Keyboard interactions
        window.addEventListener('keydown', (e) => {
          const { key } = e;
          if (/^[0-9]$/.test(key)) return appendNumber(key);
          if (key === '.') return addDot();
          if (['+', '-', '*', '/'].includes(key)) return chooseOperation(key);
          if (key === 'Enter' || key === '=') { e.preventDefault(); return compute(); }
          if (key === 'Backspace') return del();
          if (key === 'Delete') return clearAll();
          if (key === '%') return percent();
        });

        // Initialize
        updateDisplay();
      })();
    </script>
  </body>
</html>

  <script>
    // Calculator State
    let currentValue = '0';
    let previousValue = '';
    let operator = null;
    let waitingForSecondOperand = false;
    let expression = '';

    // Default configuration
    const defaultConfig = {
      calculator_title: 'Calculator',
      primary_color: '#4f46e5',
      secondary_color: '#1e1b4b',
      text_color: '#ffffff',
      accent_color: '#fbbf24',
      surface_color: '#334155',
      font_family: 'Outfit'
    };

    // DOM Elements
    const display = document.getElementById('display');
    const expressionDisplay = document.getElementById('expression');
    const calcTitle = document.getElementById('calc-title');

    // Update display
    function updateDisplay() {
      // Format number for display
      let displayValue = currentValue;
      
      // Handle very long numbers
      if (displayValue.length > 12) {
        const num = parseFloat(displayValue);
        if (!isNaN(num)) {
          displayValue = num.toExponential(6);
        }
      }
      
      display.textContent = displayValue;
      expressionDisplay.textContent = expression;
    }

    // Input number
    function inputNumber(num) {
      if (waitingForSecondOperand) {
        currentValue = num;
        waitingForSecondOperand = false;
      } else {
        if (currentValue === '0' && num !== '.') {
          currentValue = num;
        } else {
          // Limit input length
          if (currentValue.length < 15) {
            currentValue += num;
          }
        }
      }
      updateDisplay();
    }

    // Input decimal
    function inputDecimal() {
      if (waitingForSecondOperand) {
        currentValue = '0.';
        waitingForSecondOperand = false;
        updateDisplay();
        return;
      }
      
      if (!currentValue.includes('.')) {
        currentValue += '.';
      }
      updateDisplay();
    }

    // Handle operator
    function handleOperator(nextOperator) {
      const inputValue = parseFloat(currentValue);
      
      if (operator && waitingForSecondOperand) {
        operator = nextOperator;
        expression = `${previousValue} ${getOperatorSymbol(nextOperator)}`;
        updateDisplay();
        return;
      }
      
      if (previousValue === '') {
        previousValue = currentValue;
      } else if (operator) {
        const result = calculate(parseFloat(previousValue), inputValue, operator);
        currentValue = String(result);
        previousValue = currentValue;
      }
      
      waitingForSecondOperand = true;
      operator = nextOperator;
      expression = `${previousValue} ${getOperatorSymbol(nextOperator)}`;
      updateDisplay();
    }

    // Get operator symbol for display
    function getOperatorSymbol(op) {
      const symbols = {
        '+': '+',
        '-': '−',
        '*': '×',
        '/': '÷'
      };
      return symbols[op] || op;
    }

    // Calculate result
    function calculate(first, second, op) {
      switch (op) {
        case '+': return first + second;
        case '-': return first - second;
        case '*': return first * second;
        case '/': return second !== 0 ? first / second : 'Error';
        default: return second;
      }
    }

    // Handle equals
    function handleEquals() {
      if (!operator || waitingForSecondOperand) return;
      
      const inputValue = parseFloat(currentValue);
      const result = calculate(parseFloat(previousValue), inputValue, operator);
      
      expression = `${previousValue} ${getOperatorSymbol(operator)} ${currentValue} =`;
      
      if (result === 'Error') {
        currentValue = 'Error';
      } else {
        // Round to avoid floating point issues
        currentValue = String(Math.round(result * 1000000000) / 1000000000);
      }
      
      previousValue = '';
      operator = null;
      waitingForSecondOperand = false;
      updateDisplay();
    }

    // Clear calculator
    function clearCalculator() {
      currentValue = '0';
      previousValue = '';
      operator = null;
      waitingForSecondOperand = false;
      expression = '';
      updateDisplay();
    }

    // Delete last character
    function deleteLastChar() {
      if (waitingForSecondOperand) return;
      
      if (currentValue.length > 1) {
        currentValue = currentValue.slice(0, -1);
      } else {
        currentValue = '0';
      }
      updateDisplay();
    }

    // Handle percent
    function handlePercent() {
      const value = parseFloat(currentValue);
      currentValue = String(value / 100);
      updateDisplay();
    }

    // Button click handler
    document.querySelectorAll('.calc-btn').forEach(button => {
      button.addEventListener('click', () => {
        if (button.dataset.number !== undefined) {
          inputNumber(button.dataset.number);
        } else if (button.dataset.operator) {
          handleOperator(button.dataset.operator);
        } else if (button.dataset.action) {
          switch (button.dataset.action) {
            case 'clear': clearCalculator(); break;
            case 'delete': deleteLastChar(); break;
            case 'decimal': inputDecimal(); break;
            case 'equals': handleEquals(); break;
            case 'percent': handlePercent(); break;
          }
        }
      });
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      // Prevent default for calculator keys
      if (/^[0-9.]$/.test(e.key) || ['+', '-', '*', '/', 'Enter', 'Escape', 'Backspace', 'Delete', '%'].includes(e.key)) {
        e.preventDefault();
      }
      
      if (/^[0-9]$/.test(e.key)) {
        inputNumber(e.key);
      } else if (e.key === '.') {
        inputDecimal();
      } else if (['+', '-', '*', '/'].includes(e.key)) {
        handleOperator(e.key);
      } else if (e.key === 'Enter' || e.key === '=') {
        handleEquals();
      } else if (e.key === 'Escape') {
        clearCalculator();
      } else if (e.key === 'Backspace' || e.key === 'Delete') {
        deleteLastChar();
      } else if (e.key === '%') {
        handlePercent();
      }
    });

    // SDK Integration
    async function onConfigChange(config) {
      const title = config.calculator_title || defaultConfig.calculator_title;
      const fontFamily = config.font_family || defaultConfig.font_family;
      
      calcTitle.textContent = title;
      document.body.style.fontFamily = `${fontFamily}, Outfit, sans-serif`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['calculator_title', config.calculator_title || defaultConfig.calculator_title]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Initial display
    updateDisplay();
  </script>
